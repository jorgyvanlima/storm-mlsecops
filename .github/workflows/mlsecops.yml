name: MLSecOps Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install bandit safety pytest fastapi httpx joblib scikit-learn pandas uvicorn pydantic paho-mqtt psycopg2-binary websockets

    - name: Static Application Security Testing (SAST)
      run: bandit -r backend/ ai-service/ -s B101,B311

    - name: Audit Vulnerabilidades em Dependências (SCA)
      run: safety check || echo "Ignorando warnings de dependencias nao-criticas"

    - name: Execute Testes Unitários de Segurança
      run: |
        pytest backend/tests/

  deploy:
    name: Deploy to Production VPS
    needs: security-audit
    # Roda o deploy apenas se os testes passaram (needs: security-audit)
    # E apenas se o evento for um push na branch main (não faz deploy de pull requests soltos)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            echo "🔐 Conectado ao VPS de Produção com sucesso!"
            
            TARGET_DIR="/home/${{ secrets.VPS_USER }}/storm-mlsecops"
            
            # Garantir que o repositório git exista e esteja íntegro na VPS
            if [ ! -d "$TARGET_DIR/.git" ]; then
              echo "⚠️ Repositório Git não encontrado em $TARGET_DIR. Clonando repositório oficial..."
              rm -rf "$TARGET_DIR"
              git clone https://github.com/jorgyvanlima/storm-mlsecops.git "$TARGET_DIR"
            fi
            
            cd "$TARGET_DIR"
            
            git config --global --add safe.directory "$TARGET_DIR" || true
            
            echo "📥 Atualizando código-fonte do GitHub..."
            git fetch origin main
            git reset --hard origin/main
            
            echo "🐳 Reconstruindo e reiniciando serviços Docker de produção..."
            docker compose -f docker-compose.prod.yml build storm-backend frontend
            docker compose -f docker-compose.prod.yml up -d storm-backend frontend
            
            echo "✅ Deploy de produção concluído com sucesso!"
