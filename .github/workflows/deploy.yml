name: Deploy to VPS

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Deploy to Production VPS
    runs-on: ubuntu-latest
    
    # Executa o deploy apenas se for push na branch main/master. 
    # Para cenários mais maduros, poderia depender do job de testes (needs: security-audit)
    
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # Fallback temporário usando senha, mas a recomendação de segurança é usar a chave SSH
          password: ${{ secrets.VPS_PASSWORD }}
          script_stop: true
          script: |
            echo "🔐 Conectado ao VPS de Produção com sucesso!"
            
            # O diretório padrão de acordo com o deploy anterior
            TARGET_DIR="/home/${{ secrets.VPS_USER }}/storm-mlsecops"
            
            if [ ! -d "$TARGET_DIR" ]; then
              echo "⚠️ Diretório não encontrado. Clonando repositório..."
              git clone https://github.com/jorgyvanlima/storm-mlsecops.git $TARGET_DIR
            fi
            
            cd $TARGET_DIR
            
            # Garantir permissões do git
            git config --global --add safe.directory "$TARGET_DIR" || true
            
            echo "📥 Baixando atualizações do GitHub..."
            git fetch --all
            git reset --hard origin/main
            
            echo "🐳 Reconstruindo e reiniciando contêineres Docker..."
            docker compose -f docker-compose.prod.yml build
            docker compose -f docker-compose.prod.yml up -d
            
            echo "✅ Deploy concluído com sucesso!"
